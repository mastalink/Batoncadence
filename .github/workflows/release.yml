# Release pipeline: push a tag like v0.2.0 and this
#   1. runs the test suite
#   2. builds sdist + wheel and attaches them to a GitHub Release
#   3. pushes the Docker image to GHCR (ghcr.io/<owner>/batoncadence)
#   4. publishes to PyPI via trusted publishing
#
# One-time setup for step 4 (until then that job is allowed to fail):
#   PyPI -> Manage project 'batoncadence' -> Publishing -> add GitHub
#   publisher: repo mastalink/Batoncadence, workflow release.yml,
#   environment pypi. No API tokens to store.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write   # PyPI trusted publishing (OIDC)

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -e .[dev]
      - run: pytest tests/ -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install build && python -m build
      - uses: actions/upload-artifact@v4
        with: { name: dist, path: dist/ }
      - name: GitHub Release with artifacts
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/batoncadence
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          VERSION=${GITHUB_REF_NAME#v}
          docker build -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    # Allowed to fail until the PyPI trusted publisher is configured (see header).
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
